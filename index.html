<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Job Tracker</title>
  </head>
  <body class="w-11/12 mx-auto mt-5">
    <header>
      <h2>
        <h1 class="text-3xl font-bold text-left">Job Application Tracker</h1>
      </h2>
    </header>
    <!-- dashboard -->
    <section class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow text-center lg:text-left">
        <h3 class="text-gray-500 font-semibold">Total Jobs</h3>
        <p id="totalCount" class="text-3xl font-bold text-blue-400">0</p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow text-center lg:text-left">
        <h3 class="text-gray-500 font-semibold">Interview</h3>
        <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow text-center lg:text-left">
        <h3 class="text-gray-500 font-semibold">Rejected</h3>
        <p id="rejectedCount" class="text-3xl font-bold text-red-600">0</p>
      </div>
    </section>
    <section class="max-w-6xl mx-auto px-6 pb-10">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Available Jobs</h2>
        <span id="tabCount" class="text-gray-600 font-semibold">0 Jobs</span>
      </div>

      <!-- Tabs -->
      <div class="flex gap-4 mb-6">
        <button
          class="tab active bg-blue-600 text-white px-4 py-2 rounded-lg"
          data-tab="all"
        >
          All
        </button>
        <button
          class="tab bg-gray-200 px-4 py-2 rounded-lg"
          data-tab="interview"
        >
          Interview
        </button>
        <button
          class="tab bg-gray-200 px-4 py-2 rounded-lg"
          data-tab="rejected"
        >
          Rejected
        </button>
      </div>

      <!-- Jobs Container -->
      <div id="jobsContainer" class="grid grid-cols-1 gap-6"></div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
